<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>05 · 모바일 한 페이지 보기</title>
<link rel="stylesheet" href="mock-assets/styles.css">
<style>
  html,body{height:100%;}
  body{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:0;background:#dfe3ea;}
  .viewport{width:430px;height:920px;background:var(--bg-viewer);display:flex;flex-direction:column;overflow:hidden;box-shadow:0 24px 60px rgba(15,23,42,.25);}

  .page-area{flex:1 1 auto;display:flex;align-items:center;justify-content:center;padding:6px 8px;min-height:0;}
  .m-page{width:414px;height:585px;background:#fff;border-radius:12px;overflow:hidden;position:relative;box-shadow:0 14px 32px rgba(15,23,42,.22);display:flex;flex-direction:column;}
  .m-pad{padding:16px 18px 22px;height:100%;display:flex;flex-direction:column;}
  .m-title{align-self:center;font-family:'Jua','Gaegu',sans-serif;font-size:15px;color:var(--ink);background:#f3f4f7;border:1px solid var(--line);border-radius:999px;padding:6px 14px;}
  .m-frame{flex:0 0 auto;height:412px;margin-top:8px;border-radius:10px;overflow:hidden;border:5px solid var(--frame-blue);}
  .m-frame img{width:100%;height:100%;object-fit:cover;display:block;}
  .m-key{margin-top:auto;background:linear-gradient(180deg,#faf5ff,#f3e8ff);border:2px solid #e9d5ff;border-radius:10px;padding:8px 12px;}
  .m-key h4{font-family:'Jua','Gaegu',sans-serif;font-size:13px;margin:0 0 3px;color:var(--ink);}
  .m-key p{font-size:11px;line-height:1.45;color:var(--ink-soft);margin:0;font-weight:500;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
</style>
</head>
<body>
  <div class="viewport">
    <div class="urlbar">
      <span class="dot d1"></span><span class="dot d2"></span><span class="dot d3"></span>
      <span class="url">🔒 toonschool.kr/book/9zm7bn</span>
    </div>

    <div class="page-area">
      <div class="m-page">
        <div class="m-pad">
          <div class="m-title">2컷 · 갯벌에서 만난 친구들</div>
          <div class="m-frame"><img src="mock-assets/real/scene-03.jpg" alt="만화 장면"></div>
          <div class="m-key">
            <h4>💡 이번 장면 핵심</h4>
            <p>갯벌에는 조개·게·갯지렁이 등 다양한 생물이 살아요. 자연의 소중함을 알게 돼요.</p>
          </div>
        </div>
      </div>
    </div>

    <div class="mbar2">
      <div class="b"><svg viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg></div>
      <div class="pl">2 / 16</div>
      <div class="b"><svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg></div>
      <div class="b"><svg viewBox="0 0 24 24"><circle cx="12" cy="5" r="1.6"/><circle cx="12" cy="12" r="1.6"/><circle cx="12" cy="19" r="1.6"/></svg></div>
    </div>
  </div>
</body>
</html>
