<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>03 · 개선된 세상 속 이야기 페이지</title>
<link rel="stylesheet" href="mock-assets/styles.css">
<style>
  body{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:30px;}
  .pad3{padding:52px 64px 66px;height:100%;display:flex;flex-direction:column;position:relative;z-index:2;}
  .ws-title{font-family:'Jua','Gaegu',sans-serif;font-size:38px;line-height:1.2;color:var(--ink);margin:14px 0 12px;}
  .ws-body{font-size:20px;line-height:1.75;color:var(--ink-soft);font-weight:500;margin:0;}
  .ws-illus{margin-top:16px;height:300px;flex:0 0 auto;border-radius:22px;overflow:hidden;border:8px solid #ede9fe;position:relative;}
  .ws-illus img{width:100%;height:100%;object-fit:cover;display:block;}
  .glance{margin-top:14px;}
</style>
</head>
<body>
  <div class="page">
    <div class="doodle"></div>
    <div class="pad3">
      <div class="chip chip-purple">세상 속 이야기 · 역사 이야기</div>
      <h2 class="ws-title">갯벌은 생명의 보물창고</h2>
      <p class="ws-body">우리나라 갯벌은 세계에서도 아주 넓어요. 예전부터 사람들은 갯벌에서 조개와 게를 잡았고, 수많은 철새가 먹이를 찾아 찾아왔답니다.</p>

      <div class="ws-illus"><img src="mock-assets/real/scene-03.jpg" alt="갯벌 만화 장면"></div>

      <div class="card card-glance glance">
        <p class="card-title" style="color:var(--sky)">💡 한눈에 보기 · 핵심 단어</p>
        <div class="kw-row" style="margin-top:4px">
          <span class="kw">#갯벌</span><span class="kw">#생물</span><span class="kw">#철새</span><span class="kw">#조개</span><span class="kw">#발명</span>
        </div>
      </div>
    </div>
    <div class="pagenum">- 8 -</div>
  </div>
</body>
</html>
