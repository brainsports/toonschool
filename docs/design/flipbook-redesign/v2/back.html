<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<title>뒤표지 · MY TOON BOOK</title>
<link rel="stylesheet" href="mock-base.css" />
<link rel="stylesheet" href="../../../../src/modules/student/styles/flipbook.css" />
</head>
<body>
<div class="stage">
  <div class="fb-page">
    <div class="fb-back">
      <div class="fb-back-hero">
        <span class="fb-back-stamp">🎉 학습 완료</span>
        <h1 class="fb-back-title">오늘의 배움을<br/>완성했어요!</h1>
        <p class="fb-back-work">강줄기와 우리나라 땅 모양 이야기</p>
        <div class="fb-back-meta">
          <span>지은이 김도현</span>
          <span>5학년 2반</span>
          <span>완성일 2026.07.13</span>
        </div>
        <div class="fb-back-cta">
          <span class="fb-cta-emoji">📨</span>
          <div>
            <div class="fb-cta-title">내 만화책을 친구에게 자랑해요</div>
            <div class="fb-cta-sub">작품 링크를 복사해 보내보세요</div>
          </div>
        </div>
      </div>
      <div class="fb-back-art">
        <img class="fb-back-hero-img" src="../mock-assets/real/scene-03-wide.jpg" alt="대표 만화" />
        <div class="fb-back-share">
          <div class="fb-share-brand">TOONSCHOOL</div>
          <div class="fb-share-sub">작품 링크를 공유하고 다시 감상해 보세요</div>
          <img class="fb-share-qr" src="../mock-assets/real/page-11.jpg" alt="공유 QR 카드" />
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
