<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<title>OX 퀴즈 · MY TOON BOOK</title>
<link rel="stylesheet" href="mock-base.css" />
<link rel="stylesheet" href="../../../../src/modules/student/styles/flipbook.css" />
</head>
<body>
<div class="stage">
  <div class="fb-page">
    <div class="fb-progress"><span style="width:81.25%"></span></div>
    <div class="fb-chrome">
      <div class="fb-subject-row">
        <span class="fb-subject-dot"></span>
        <span class="fb-subject-name">사회</span>
        <span class="fb-unit">우리나라의 강줄기와 땅 모양</span>
      </div>
      <span class="fb-chip is-quiz">OX 퀴즈 <span class="fb-chip-count">Q.3 / 5</span></span>
    </div>

    <div class="fb-quiz">
      <div class="fb-quiz-qnum">Q.3</div>
      <h2 class="fb-quiz-question">강은 곧게 흐를수록 땅을 더 깊게 파내며 산지를 만든다. 맞을까요?</h2>
      <div class="fb-quiz-ox">
        <button class="fb-ox is-o is-wrong" type="button">O<span class="fb-ox-lab">맞아요</span></button>
        <button class="fb-ox is-x is-correct" type="button">X<span class="fb-ox-lab">아니에요</span></button>
      </div>
      <div class="fb-quiz-result">
        <div class="fb-quiz-badge is-correct">✓</div>
        <div class="fb-quiz-explain is-correct">
          <div class="fb-quiz-verdict">정답은 X — 한 번 더 생각해 보세요!</div>
          <div class="fb-quiz-body">강이 구불구불 흐르면서 바깥쪽 둑을 깎고 안쪽에 모래를 쌓아 평평한 땅을 만들어요. 곧게 흐를 때보다 구불거릴 때 땅 모양이 더 많이 바뀝니다.</div>
        </div>
      </div>
    </div>
    <div class="fb-pageno">- 13 -</div>
  </div>
</div>
</body>
</html>
